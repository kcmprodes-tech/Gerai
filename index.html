<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Gerai Kompas, ecommerce pilihan produk harian, fashion, elektronik, kecantikan, dan kebutuhan rumah.">
    <title>Gerai Kompas</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="topbar shell">
        <a class="brand" href="#" aria-label="Gerai Kompas">
          <img class="brand-logo" src="./assets/gerai-logo.webp" alt="Gerai Kompas">
        </a>

        <label class="search" for="searchInput">
          <input id="searchInput" type="search" placeholder="Search for any product or brand" autocomplete="off">
          <span class="search-submit" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M11 4a7 7 0 1 0 4.38 12.46l3.58 3.58 1.08-1.08-3.58-3.58A7 7 0 0 0 11 4Zm0 1.6a5.4 5.4 0 1 1 0 10.8 5.4 5.4 0 0 1 0-10.8Z"/></svg>
          </span>
          <button id="clearSearch" class="icon-button hidden" type="button" aria-label="Bersihkan pencarian">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m7.05 5.64 11.31 11.31-1.41 1.41L5.64 7.05l1.41-1.41Z"/><path d="M16.95 5.64 18.36 7.05 7.05 18.36l-1.41-1.41L16.95 5.64Z"/></svg>
          </button>
        </label>

        <nav class="account-actions" aria-label="Akun dan belanja">
          <button class="icon-button mobile-search-toggle" type="button" aria-label="Buka pencarian">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M11 4a7 7 0 1 0 4.38 12.46l3.58 3.58 1.08-1.08-3.58-3.58A7 7 0 0 0 11 4Zm0 1.6a5.4 5.4 0 1 1 0 10.8 5.4 5.4 0 0 1 0-10.8Z"/></svg>
          </button>
          <button id="wishlistToggle" class="icon-button" type="button" aria-label="Lihat wishlist">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 20.35 10.55 19C5.4 14.2 2 11.04 2 7.15 2 4 4.42 1.55 7.5 1.55c1.74 0 3.41.81 4.5 2.09a5.93 5.93 0 0 1 4.5-2.09C19.58 1.55 22 4 22 7.15c0 3.89-3.4 7.05-8.55 11.86L12 20.35Zm0-2.73.1-.1C16.86 13.08 20 10.15 20 7.15c0-2.1-1.55-3.6-3.5-3.6-1.5 0-2.96.96-3.47 2.29h-2.07C10.46 4.51 9 3.55 7.5 3.55 5.55 3.55 4 5.05 4 7.15c0 3 3.14 5.93 7.9 10.37l.1.1Z"/></svg>
            <span id="wishlistCount" class="badge hidden">0</span>
          </button>
          <button id="cartToggle" class="icon-button" type="button" aria-label="Buka keranjang">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2Zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2ZM7.16 14.26c-.75 0-1.41-.41-1.75-1.03L2 3H0V1h3.31l.94 2H22l-3.2 9.59a2.49 2.49 0 0 1-2.37 1.71H7.16ZM5.22 5l2.03 7.26h9.18c.21 0 .4-.13.47-.33L19.22 5h-14Z"/></svg>
            <span id="cartCount" class="badge hidden">0</span>
          </button>
          <div class="auth-actions" id="authActions">
            <button class="btn ghost" id="openLoginModal" type="button">Masuk</button>
            <a class="btn primary" href="#register">Daftar</a>
          </div>
          <button class="avatar-button hidden" id="accountAvatar" type="button" aria-label="Akun saya">AS</button>
        </nav>
      </div>

      <div class="category-row">
        <div class="category-bar shell" aria-label="Kategori produk">
          <button class="category-tab all-category active" data-category="all" type="button">
            <span class="category-grid-icon" aria-hidden="true"></span>
            <span>Semua kategori</span>
            <span class="category-caret" aria-hidden="true"></span>
          </button>
          <span class="category-divider" aria-hidden="true"></span>
          <div class="category-scroll" aria-label="Menu kategori">
            <button class="category-tab" type="button">Promo 6.6</button>
            <button class="category-tab" type="button">Ultimate 10k Series</button>
            <button class="category-tab" type="button">Terpopuler</button>
            <button class="category-tab" type="button">Rekomendasi</button>
            <button class="category-tab" type="button">Bundling</button>
            <button class="category-tab" type="button">Official merchandise</button>
            <button class="category-tab" type="button">Langganan Kompas.id</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="hero shell" aria-label="Katalog Merchandise Kompas edisi HUT ke-60">
        <img src="./assets/hero-merchandise-kompas.png" alt="Katalog Merchandise Kompas edisi HUT ke-60">
      </section>

      <section class="section shell" aria-labelledby="popularTitle">
        <div class="section-heading">
          <h2 id="popularTitle">Explore Popular Categories</h2>
          <button class="link-button" data-scroll-target="productGrid" type="button">View All</button>
        </div>
        <div class="popular-categories" id="popularCategories"></div>
      </section>

      <section class="section shell" id="deals" aria-labelledby="dealsTitle">
        <div class="section-heading controls-heading">
          <h2 id="dealsTitle">Baru di gerai</h2>
          <button class="link-button" data-scroll-target="productGrid" type="button">View All</button>
        </div>
        <div id="activeFilter" class="active-filter hidden"></div>
        <div id="productGrid" class="product-grid" aria-live="polite"></div>
        <p id="emptyState" class="empty-state hidden">Produk tidak ditemukan. Coba kata kunci atau kategori lain.</p>
      </section>
    </main>

    <aside id="cartDrawer" class="drawer" aria-label="Keranjang belanja" aria-hidden="true">
      <div class="drawer-panel">
        <div class="drawer-header">
          <h2>Keranjang</h2>
          <button id="closeCart" class="icon-button" type="button" aria-label="Tutup keranjang">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m7.05 5.64 11.31 11.31-1.41 1.41L5.64 7.05l1.41-1.41Z"/><path d="M16.95 5.64 18.36 7.05 7.05 18.36l-1.41-1.41L16.95 5.64Z"/></svg>
          </button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="drawer-footer">
          <div class="total-row">
            <span>Total</span>
            <strong id="cartTotal">Rp0</strong>
          </div>
          <button class="btn primary checkout" type="button">Checkout</button>
        </div>
      </div>
    </aside>

    <div class="login-overlay" id="homeLoginModal" hidden>
      <div class="login-popup" role="dialog" aria-modal="true" aria-labelledby="homeLoginTitle">
        <h2 id="homeLoginTitle">Masuk Akun</h2>
        <p class="login-register">Belum punya akun? <a href="#register">Daftar sekarang.</a></p>

        <div class="login-panel" data-home-login-step="identity">
          <label for="homeLoginIdentity">Email atau Nomor Telepon</label>
          <input id="homeLoginIdentity" type="text" autocomplete="username">
          <p>Contoh format nama@email.com atau 081234567890.</p>
          <button class="continue-button" id="homeContinueIdentity" type="button">Lanjutkan</button>

          <div class="login-separator"><span>Atau</span></div>

          <button class="social-button google" type="button">
            <span class="google-mark" aria-hidden="true">G</span>
            <span>Lanjutkan dengan Google</span>
          </button>
          <button class="social-button apple" type="button">
            <span class="apple-mark" aria-hidden="true"></span>
            <span>Lanjutkan dengan Apple</span>
          </button>
          <button class="social-button privy" type="button">
            <span class="privy-mark" aria-hidden="true"></span>
            <span>Lanjutkan dengan Privy</span>
          </button>
        </div>

        <div class="login-panel password-panel" data-home-login-step="password" hidden>
          <div class="login-identity-row">
            <div>
              <strong>Email</strong>
              <p id="homeLoginIdentityPreview">ikhwanardhi@gmail.com</p>
            </div>
            <button id="homeChangeIdentity" type="button">Ubah</button>
          </div>

          <label for="homeLoginPassword">Kata Sandi</label>
          <div class="password-field">
            <input id="homeLoginPassword" type="password" autocomplete="current-password">
            <button id="homeTogglePassword" type="button" aria-label="Tampilkan kata sandi">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m2.81 2.81 18.38 18.38-1.41 1.41-3.07-3.07A11.8 11.8 0 0 1 12 20C5 20 1 12 1 12a20.2 20.2 0 0 1 4.12-5.48L1.4 2.1l1.41-1.29Zm5.02 5.02A5.9 5.9 0 0 0 6.23 12 5.77 5.77 0 0 0 12 17.77c1 0 1.94-.25 2.76-.69l-1.52-1.52A3.74 3.74 0 0 1 8.44 10.76L7.83 7.83ZM12 4c7 0 11 8 11 8a20.6 20.6 0 0 1-3.18 4.56l-1.42-1.42A18.1 18.1 0 0 0 20.73 12S17.43 6 12 6c-.74 0-1.43.11-2.08.29L8.31 4.68A10.94 10.94 0 0 1 12 4Zm0 2.23A5.77 5.77 0 0 1 17.77 12c0 .53-.07 1.04-.21 1.52l-2.13-2.13A3.73 3.73 0 0 0 12.61 8.57l-2.13-2.13c.48-.14.99-.21 1.52-.21Z"/></svg>
            </button>
          </div>

          <div class="password-options">
            <label class="remember-check">
              <input type="checkbox">
              <span></span>
              Ingat saya.
            </label>
            <a href="#forgot-password">Lupa kata sandi?</a>
          </div>

          <button class="continue-button" id="homeContinuePassword" type="button">Lanjutkan</button>

          <div class="login-separator"><span>Atau</span></div>

          <button class="social-button google" type="button">
            <span class="google-mark" aria-hidden="true">G</span>
            <span>Lanjutkan dengan Google</span>
          </button>
          <button class="social-button apple" type="button">
            <span class="apple-mark" aria-hidden="true"></span>
            <span>Lanjutkan dengan Apple</span>
          </button>
          <button class="social-button privy" type="button">
            <span class="privy-mark" aria-hidden="true"></span>
            <span>Lanjutkan dengan Privy</span>
          </button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
