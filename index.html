<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Gerai Kompas, ecommerce pilihan produk harian, fashion, elektronik, kecantikan, dan kebutuhan rumah.">
    <title>Gerai Kompas</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="topbar shell">
        <a class="brand" href="#" aria-label="Gerai Kompas">
          <span class="brand-mark">K</span>
          <span class="brand-copy">
            <strong>Gerai</strong>
            <span>Kompas</span>
          </span>
        </a>

        <label class="search" for="searchInput">
          <span class="sparkle" aria-hidden="true">✦</span>
          <input id="searchInput" type="search" placeholder="Search for any product or brand" autocomplete="off">
          <span class="search-submit" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M11 4a7 7 0 1 0 4.38 12.46l3.58 3.58 1.08-1.08-3.58-3.58A7 7 0 0 0 11 4Zm0 1.6a5.4 5.4 0 1 1 0 10.8 5.4 5.4 0 0 1 0-10.8Z"/></svg>
          </span>
          <button id="clearSearch" class="icon-button hidden" type="button" aria-label="Bersihkan pencarian">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m7.05 5.64 11.31 11.31-1.41 1.41L5.64 7.05l1.41-1.41Z"/><path d="M16.95 5.64 18.36 7.05 7.05 18.36l-1.41-1.41L16.95 5.64Z"/></svg>
          </button>
        </label>

        <nav class="account-actions" aria-label="Akun dan belanja">
          <button id="wishlistToggle" class="icon-button" type="button" aria-label="Lihat wishlist">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 20.35 10.55 19C5.4 14.2 2 11.04 2 7.15 2 4 4.42 1.55 7.5 1.55c1.74 0 3.41.81 4.5 2.09a5.93 5.93 0 0 1 4.5-2.09C19.58 1.55 22 4 22 7.15c0 3.89-3.4 7.05-8.55 11.86L12 20.35Zm0-2.73.1-.1C16.86 13.08 20 10.15 20 7.15c0-2.1-1.55-3.6-3.5-3.6-1.5 0-2.96.96-3.47 2.29h-2.07C10.46 4.51 9 3.55 7.5 3.55 5.55 3.55 4 5.05 4 7.15c0 3 3.14 5.93 7.9 10.37l.1.1Z"/></svg>
            <span id="wishlistCount" class="badge hidden">0</span>
          </button>
          <button id="cartToggle" class="icon-button" type="button" aria-label="Buka keranjang">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2Zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2ZM7.16 14.26c-.75 0-1.41-.41-1.75-1.03L2 3H0V1h3.31l.94 2H22l-3.2 9.59a2.49 2.49 0 0 1-2.37 1.71H7.16ZM5.22 5l2.03 7.26h9.18c.21 0 .4-.13.47-.33L19.22 5h-14Z"/></svg>
            <span id="cartCount" class="badge hidden">0</span>
          </button>
          <a class="btn ghost" href="#login">Masuk</a>
          <a class="btn primary" href="#register">Daftar</a>
        </nav>
      </div>

      <div class="category-bar shell" aria-label="Kategori produk">
        <button class="category-tab active" data-category="all" type="button">All Categories</button>
        <button class="category-tab" data-category="Electronics" type="button">Electronics</button>
        <button class="category-tab" data-category="Fashion" type="button">Fashion</button>
        <button class="category-tab" data-category="Women's" type="button">Women's</button>
        <button class="category-tab" data-category="Kids Fashion" type="button">Kids Fashion</button>
        <button class="category-tab" data-category="Beauty" type="button">Healthy & Beauty</button>
        <button class="category-tab" data-category="Groceries" type="button">Groceries</button>
        <button class="category-tab" data-category="Luxury" type="button">Luxury Item</button>
      </div>
    </header>

    <main>
      <section class="hero shell" aria-label="Area promosi utama"></section>

      <section class="section shell" aria-labelledby="popularTitle">
        <div class="section-heading">
          <h2 id="popularTitle">Explore Popular Categories</h2>
          <button class="link-button" data-scroll-target="productGrid" type="button">View All</button>
        </div>
        <div class="popular-categories" id="popularCategories"></div>
      </section>

      <section class="section shell" id="deals" aria-labelledby="dealsTitle">
        <div class="section-heading controls-heading">
          <h2 id="dealsTitle">Todays Best Deals For You!</h2>
          <button class="link-button" data-scroll-target="productGrid" type="button">View All</button>
        </div>
        <div id="activeFilter" class="active-filter hidden"></div>
        <div id="productGrid" class="product-grid" aria-live="polite"></div>
        <p id="emptyState" class="empty-state hidden">Produk tidak ditemukan. Coba kata kunci atau kategori lain.</p>
      </section>
    </main>

    <aside id="cartDrawer" class="drawer" aria-label="Keranjang belanja" aria-hidden="true">
      <div class="drawer-panel">
        <div class="drawer-header">
          <h2>Keranjang</h2>
          <button id="closeCart" class="icon-button" type="button" aria-label="Tutup keranjang">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m7.05 5.64 11.31 11.31-1.41 1.41L5.64 7.05l1.41-1.41Z"/><path d="M16.95 5.64 18.36 7.05 7.05 18.36l-1.41-1.41L16.95 5.64Z"/></svg>
          </button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="drawer-footer">
          <div class="total-row">
            <span>Total</span>
            <strong id="cartTotal">Rp0</strong>
          </div>
          <button class="btn primary checkout" type="button">Checkout</button>
        </div>
      </div>
    </aside>

    <script src="./script.js"></script>
  </body>
</html>
