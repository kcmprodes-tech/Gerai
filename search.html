<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hasil pencarian - Gerai Kompas</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./styles.css?v=20260603-search-page">
  </head>
  <body class="search-page">
    <header class="site-header">
      <div class="topbar shell">
        <a class="brand" href="./index.html" aria-label="Gerai Kompas">
          <img class="brand-logo" src="./assets/gerai-logo.webp" alt="Gerai Kompas">
        </a>

        <label class="search" for="searchPageInput">
          <button class="search-close-mobile" id="closeSearchMobile" type="button" aria-label="Tutup pencarian">
            <i class="ph ph-arrow-left" aria-hidden="true"></i>
          </button>
          <input id="searchPageInput" type="search" placeholder="Search for any product or brand" autocomplete="off">
          <button class="search-submit" id="submitSearchPage" type="button" aria-label="Cari produk"><i class="ph ph-magnifying-glass" aria-hidden="true"></i>
          </button>
          <button id="clearSearchPage" class="icon-button hidden" type="button" aria-label="Bersihkan pencarian">
            <i class="ph ph-x" aria-hidden="true"></i>
          </button>
        </label>

        <nav class="account-actions" aria-label="Akun dan belanja">
          <button class="icon-button mobile-search-toggle" type="button" aria-label="Buka pencarian"><i class="ph ph-magnifying-glass" aria-hidden="true"></i>
          </button>
          <a class="icon-button" href="./cart.html" aria-label="Buka keranjang"><i class="ph ph-shopping-cart" aria-hidden="true"></i>
          </a>
          <div class="auth-actions" id="searchAuthActions">
            <a class="btn ghost" href="./index.html#login">Masuk</a>
            <a class="btn primary" href="#register">Daftar</a>
            <a class="icon-button mobile-login-icon" href="./index.html#login" aria-label="Masuk akun"><i class="ph ph-user" aria-hidden="true"></i>
            </a>
          </div>
          <button class="avatar-button hidden" id="searchAccountAvatar" type="button" aria-label="Akun saya" data-avatar-menu-trigger>AS</button>
        </nav>
      </div>
    </header>

    <main class="search-results-shell">
      <section class="section shell search-results-section" aria-labelledby="searchResultsTitle">
        <div class="search-results-heading">
          <p>Hasil pencarian</p>
          <h1 id="searchResultsTitle">Produk</h1>
          <span id="searchResultsCount">0 produk ditemukan</span>
        </div>
        <div id="searchResultsGrid" class="product-grid" aria-live="polite"></div>
        <p id="searchResultsEmpty" class="empty-state hidden">Produk tidak ditemukan. Coba kata kunci lain.</p>
      </section>
    </main>

    <div class="wishlist-toast" data-wishlist-toast>Berhasil menyimpan di wishlist</div>

    <script src="./search.js?v=20260603-search-page"></script>
    <script src="./avatar-menu.js"></script>
  </body>
</html>
